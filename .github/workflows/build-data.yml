name: build data

on:
  schedule:
    - cron: "0 11 * * *"        # ~6am ET daily, after games settle — current season only
  workflow_dispatch:             # manual: backfill a past season via the "Run workflow" button
    inputs:
      season:
        description: "Season to build (blank = current year)"
        required: false
        default: ""

permissions:
  contents: write                # allow the job to commit the refreshed JSON

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests pandas lxml beautifulsoup4 pybaseball

      - name: Resolve season
        id: season
        run: |
          S="${{ github.event.inputs.season }}"
          if [ -z "$S" ]; then S="$(date +%Y)"; fi
          echo "value=$S" >> "$GITHUB_OUTPUT"

      - name: Build players-${{ steps.season.outputs.value }}.json
        run: |
          mkdir -p public/data
          python build_data.py \
            --season "${{ steps.season.outputs.value }}" \
            --min-pa 75 \
            --out "public/data/players-${{ steps.season.outputs.value }}.json"

      - name: Commit if changed
        run: |
          git config user.name  "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add public/data/*.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh season ${{ steps.season.outputs.value }}"
            git push
          fi
